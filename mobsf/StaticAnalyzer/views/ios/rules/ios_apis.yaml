- id: api_network_calls
  message: 网络调用
  input_case: exact
  pattern: URLSession|CFStream|NSStream
  type: Regex
  severity: info
- id: api_keychain_access
  message: Keychain 访问
  input_case: exact
  pattern: Keychain|SecItemAdd|SecItemUpdateSecItemCopy|kSecAttr
  type: Regex
  severity: info
- id: api_webview
  message: WebView 组件
  input_case: exact
  pattern: UIWebView|WKWebView
  type: Regex
  severity: info
- id: api_safari_view
  message: SFSafariViewController 组件
  input_case: exact
  pattern: SFSafariViewController
  type: Regex
  severity: info
- id: api_encryption
  message: 加密 API
  input_case: exact
  pattern: CommonCrypto|CryptoKit
  type: Regex
  severity: info
- id: api_webview_load
  message: WebView 加载请求
  input_case: exact
  pattern:
  - loadRequest
  - webView
  type: RegexAnd
  severity: info
- id: api_webview_load_string
  message: WebView 加载 HTML 字符串
  input_case: exact
  pattern:
  - loadHTMLString
  - webView
  type: RegexAnd
  severity: info
- id: api_cookie
  message: Cookie 存储
  input_case: exact
  pattern:
  - HTTPCookieStorage
  - shared|sharedHTTPCookieStorage
  type: RegexAnd
  severity: info
- id: api_ui_pasteboard
  message: UIPasteboard
  input_case: exact
  pattern: UIPasteboard
  type: Regex
  severity: info
- id: api_userdefaults
  message: UserDefaults
  input_case: exact
  pattern: UserDefaults
  type: Regex
  severity: info
- id: api_core_data
  message: CoreData
  input_case: exact
  pattern: CoreData
  type: Regex
  severity: info
- id: api_local_auth
  message: 本地认证框架
  input_case: exact
  pattern: LAContext
  type: Regex
  severity: info
- id: api_uiactivity_share
  message: UIActivity 分享
  input_case: exact
  pattern: UIActivity
  type: Regex
  severity: info
