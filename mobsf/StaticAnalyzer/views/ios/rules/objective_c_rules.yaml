- id: ios_ip_disclosure
  message: IP 地址泄露
  input_case: exact
  pattern: (?<![.\d])(?:(?:25[0-5]|2[0-4][0-9]|1[0-9][0-9]|[1-9][0-9]|[0-9])\.){3}(?:25[0-5]|2[0-4][0-9]|1[0-9][0-9]|[1-9][0-9]|[0-9])(?![.\d])
  severity: warning
  type: Regex
  metadata:
    cvss: 4.3
    cwe: cwe-200
    masvs: code-2
    owasp-mobile: ''
- id: ios_hardcoded_info
  message: 文件可能包含硬编码的敏感信息，如用户名、密码、密钥等。
  input_case: lower
  pattern: (password\s*=\s*[\'|\"].{1,100}[\'|\"]\s{0,5})|(pass\s*=\s*[\'|\"].{1,100}[\'|\"]\s{0,5})|(username\s*=\s*[\'|\"].{1,100}[\'|\"]\s{0,5})|(secret\s*=\s*[\'|\"].{1,100}[\'|\"]\s{0,5})|(key\s*=\s*[\'|\"].{1,100}[\'|\"]\s{0,5})
  severity: high
  type: Regex
  metadata:
    cvss: 7.4
    cwe: cwe-312
    masvs: storage-14
    owasp-mobile: m9
    ref: https://github.com/MobSF/owasp-mstg/blob/master/Document/0x05d-Testing-Data-Storage.md#checking-memory-for-sensitive-data-mstg-storage-10
